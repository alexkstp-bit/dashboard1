function makeDailyData(ytd,days,seed){
  const N=110,pa=N-days,pk=ytd*(1.45+seed*0.08);
  const cum=Array.from({length:N},(_,i)=>{
    if(i<pa)return Math.round(pk*(i/pa+Math.sin(i*seed*1.3)*0.04));
    return Math.round(pk+(ytd-pk)*((i-pa)/days)+Math.sin(i*seed*0.9)*Math.abs(pk-ytd)*0.02);
  });
  cum[N-1]=ytd;
  const ml={0:'Jan',18:'Feb',37:'Mar',56:'Apr',74:'May',92:'Jun'};
  return cum.map((pnl,i)=>{
    const sl=cum.slice(Math.max(0,i-29),i+1);
    return{i,lbl:ml[i]||'',pnl,ma:Math.round(sl.reduce((a,b)=>a+b,0)/sl.length)};
  });
}
function makeTraderCurve(ytd,perf,seed){
  const N=110,abs=Math.abs(ytd),sign=ytd>=0?1:-1,pk=abs*(1.45+seed*0.08);
  const cum=Array.from({length:N},(_,i)=>{
    const t=i/(N-1);
    const shape=perf<0.4?Math.pow(t,0.5):perf>0.75?Math.pow(t,2.2):t;
    const noise=Math.sin(i*seed*0.8)*abs*(0.03+perf*0.04)+Math.cos(i*seed*1.3)*abs*0.02;
    if(sign<0){const pk2=abs*0.6,dec=abs*1.6;return Math.round(pk2*Math.pow(t,0.6)-dec*Math.pow(t,2.5)+noise*(1-t));}
    return Math.round(sign*abs*shape+noise*(1-t*0.5));
  });
  cum[N-1]=ytd;
  for(let k=0;k<3;k++)for(let i=1;i<N-1;i++)cum[i]=Math.round((cum[i-1]+cum[i]*2+cum[i+1])/4);
  cum[N-1]=ytd;
  return cum;
}

function div(style,children=[]){
  const d=document.createElement('div');if(style)Object.assign(d.style,style);
  children.forEach(c=>{if(c!=null&&c!==false)d.appendChild(typeof c==='string'?document.createTextNode(c):c);});return d;
}
function span(style,text){const s=document.createElement('span');if(style)Object.assign(s.style,style);s.textContent=String(text);return s;}
function btn(text,style,fn){const b=document.createElement('button');if(style)Object.assign(b.style,style);b.textContent=text;if(fn)b.addEventListener('click',fn);return b;}
function mkSVG(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}
function mkTag(text,color){const t=document.createElement('span');t.style.cssText=`background:${color}22;color:${color};border-radius:5px;padding:1px 7px;font-size:9px;font-weight:700;white-space:nowrap`;t.textContent=String(text);return t;}
function mkTog(opts,active,fn){const w=document.createElement('div');w.className='tw';opts.forEach(o=>{const b=document.createElement('button');b.className='tb'+(o===active?' on':'');b.textContent=o;b.addEventListener('click',()=>fn(o));w.appendChild(b);});return w;}

}

// ── SVG SPARKLINE ─────────────────────────────────────────────────────────────
function sparkline(data,color){
  const w=200,h=44,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const x=i=>(i/(data.length-1))*w,y=v=>h-(((v-mn)/rng)*(h-4)+2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const s=mkSVG('svg',{viewBox:`0 0 ${w} ${h}`,preserveAspectRatio:'none'});
  s.style.cssText='flex:1;height:44px;display:block';
  const defs=mkSVG('defs'),gr=mkSVG('linearGradient',{id:'sg',x1:'0',y1:'0',x2:'0',y2:'1'});
  const s1=mkSVG('stop',{offset:'0%'});s1.style.stopColor=color;s1.style.stopOpacity='0.35';
  const s2=mkSVG('stop',{offset:'100%'});s2.style.stopColor=color;s2.style.stopOpacity='0';
  gr.appendChild(s1);gr.appendChild(s2);defs.appendChild(gr);s.appendChild(defs);
  s.appendChild(mkSVG('path',{d:'M0,'+h+' '+data.map((v,i)=>`L${x(i)},${y(v)}`).join(' ')+` L${w},${h} Z`,fill:'url(#sg)'}));
  s.appendChild(mkSVG('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':'1.5'}));return s;
}

// ── COMPARISON CHART ──────────────────────────────────────────────────────────
function compChart(trN,deskN,tc){
  const N=trN.length,w=700,h=220,pl=46,pr=60,pt=10,pb=24,cw=w-pl-pr,ch=h-pt-pb;
  const all=[...trN,...deskN],mn=Math.min(...all,-5),mx=Math.max(...all,5),rng=mx-mn||1;
  const px=i=>pl+(i/(N-1))*cw,py=v=>pt+ch-(((v-mn)/rng)*ch);
  const s=mkSVG('svg',{viewBox:`0 0 ${w} ${h}`,preserveAspectRatio:'none'});
  s.style.cssText='width:100%;height:220px;display:block';
  [-100,-50,0,50,100].filter(v=>v>=mn&&v<=mx).forEach(v=>{
    const yy=py(v);s.appendChild(mkSVG('line',{x1:pl,y1:yy,x2:w-pr,y2:yy,stroke:v===0?MUT():BRD(),'stroke-dasharray':v===0?'4,3':'3,3'}));
    const yt=mkSVG('text',{x:pl-6,y:yy+4,'text-anchor':'end',fill:MUT(),'font-size':'9'});yt.textContent=v+'%';s.appendChild(yt);
  });
  const ML={0:'Jan',18:'Feb',37:'Mar',56:'Apr',74:'May',92:'Jun'};
  Object.entries(ML).forEach(([i,l])=>{const xt=mkSVG('text',{x:px(+i),y:h-8,'text-anchor':'middle',fill:MUT(),'font-size':'9'});xt.textContent=l;s.appendChild(xt);});
  s.appendChild(mkSVG('path',{d:'M'+px(0)+','+py(0)+' '+trN.map((v,i)=>`L${px(i)},${py(v)}`).join(' ')+` L${px(N-1)},${py(0)} Z`,fill:tc,opacity:'0.07'}));
  s.appendChild(mkSVG('polyline',{points:deskN.map((v,i)=>`${px(i)},${py(v)}`).join(' '),fill:'none',stroke:G(),'stroke-width':'1.5','stroke-dasharray':'5,3',opacity:'0.85'}));
  s.appendChild(mkSVG('polyline',{points:trN.map((v,i)=>`${px(i)},${py(v)}`).join(' '),fill:'none',stroke:tc,'stroke-width':'2.5'}));
  const tf=trN[N-1],df=deskN[N-1];
  s.appendChild(mkSVG('circle',{cx:px(N-1),cy:py(df),r:'3',fill:G()}));s.appendChild(mkSVG('circle',{cx:px(N-1),cy:py(tf),r:'4',fill:tc}));
  const tl=mkSVG('text',{x:px(N-1)+8,y:py(tf)+4,'text-anchor':'start',fill:tc,'font-size':'10','font-weight':'700'});tl.textContent=tf.toFixed(1)+'%';s.appendChild(tl);
  const dl=mkSVG('text',{x:px(N-1)+8,y:py(df)+4,'text-anchor':'start',fill:G(),'font-size':'10'});dl.textContent=df.toFixed(1)+'%';s.appendChild(dl);
  return s;
}

  const sc=div({background:CARD(),border:`1px solid ${R()}40`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',minHeight:'0'});
  sc.appendChild(div({display:'flex',alignItems:'center',gap:'8px',flexShrink:'0',marginBottom:'10px'},[secHdr('NEAR HARD STOP',R()),mkTag(String(STOPS.length),R())]));
  const sb=div({display:'flex',flexDirection:'column',gap:'7px',flex:'1',overflowY:'auto'});

  // Below MA
  const mc=div({background:CARD(),border:`1px solid ${A()}40`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',minHeight:'0'});
  mc.appendChild(div({display:'flex',alignItems:'center',gap:'8px',flexShrink:'0',marginBottom:'6px'},[secHdr('P&L BELOW 30-DAY AVG',A()),mkTag(String(BMA.length),A())]));
  mc.appendChild(span({fontSize:'8px',color:MUT(),marginBottom:'8px',display:'block',flexShrink:'0'},'↗ Click trader to view YTD chart'));
  const mb=div({display:'flex',flexDirection:'column',gap:'7px',flex:'1',overflowY:'auto'});
  BMA.forEach(t=>{const pb=t.ma>0?Math.round((t.ma-t.ytd)/t.ma*100):0;const r=div({background:SUR(),borderRadius:'8px',padding:'9px 11px',border:`1px solid ${BRD()}`,cursor:'pointer'});r.addEventListener('mouseenter',()=>r.style.borderColor=A()+'60');r.addEventListener('mouseleave',()=>r.style.borderColor=BRD());r.addEventListener('click',()=>set('tModal',t));r.appendChild(div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'},[div({display:'flex',alignItems:'center',gap:'7px'},[span({fontSize:'14px',fontWeight:'700',color:TXT()},t.n),mkTag(t.b,MUT())]),div({display:'flex',alignItems:'center',gap:'8px'},[span({fontSize:'9px',color:A()},`−${pb}% · ${t.d}d`),span({fontSize:'11px',color:A()},'↗')])]));r.appendChild(div({display:'flex',gap:'20px'},[div({},[span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'1px'},'YTD P&L'),span({fontSize:'12px',fontWeight:'600',color:R()},fmt(t.ytd))]),div({},[span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'1px'},'30d Avg'),span({fontSize:'12px',color:DIM()},fmt(t.ma))])]));mb.appendChild(r);});
  mc.appendChild(mb);grid.appendChild(mc);

  vc2.appendChild(vg);grid.appendChild(vc2);

  // Blocked
  const blkC=div({background:CARD(),border:`1px solid ${R()}40`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',minHeight:'0'});
  blkC.appendChild(div({display:'flex',alignItems:'center',gap:'8px',flexShrink:'0',marginBottom:'10px'},[secHdr('BLOCKED CONTRACTS',R()),mkTag(`${BLK.filter(c=>c.t.length).length} exposed`,R())]));
  BLK.forEach(c=>{const r=div({background:SUR(),borderRadius:'8px',padding:'9px 11px',border:`1px solid ${c.t.length?R()+'40':BRD()}`,marginBottom:'7px'});r.appendChild(div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:c.t.length?'6px':'0'},[span({fontSize:'13px',fontWeight:'700',color:c.t.length?R():TXT()},c.c),span({fontSize:'9px',color:DIM()},`exp. ${c.e}`)]));if(c.t.length){const tw=div({display:'flex',gap:'5px'});c.t.forEach(t=>tw.appendChild(mkTag(t,R())));r.appendChild(tw);}else r.appendChild(span({fontSize:'9px',color:MUT()},'No exposed traders'));blkC.appendChild(r);});
  grid.appendChild(blkC);

  wrap.appendChild(grid);
  return wrap;
}

// OVERVIEW tab — executive view
function buildOverview(){
  const wrap=div({overflowY:'auto',flex:'1',padding:'10px 12px',display:'flex',flexDirection:'column',gap:'8px'});
  const g2=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'});

  // Business Performance
  const bp=div({background:CARD(),border:`1px solid ${BRD()}`,borderRadius:'10px',padding:'12px 14px'});
  bp.appendChild(secHdr('BUSINESS PERFORMANCE',G()));
  const hdrs=['Metric','Today','MTD','YTD','vs Target'];
  const bpTbl=document.createElement('table');
  const bpTh=document.createElement('tr');hdrs.forEach(h=>{const th=document.createElement('th');th.textContent=h;bpTh.appendChild(th);});bpTbl.appendChild(bpTh);
  [{l:'Gross P&L',d:DESK_BUSI.gross,isV:false},{l:'Net P&L',d:DESK_BUSI.net,isV:false},{l:'Volume (lots)',d:DESK_BUSI.vol,isV:true}].forEach(({l,d,isV})=>{
    const tr=document.createElement('tr');const pct=pctOf(d.ytd,d.target);const c=pct>=80?G():pct>=60?A():R();
    [l,isV?fv(d.today):fmt(d.today),isV?fv(d.mtd):fmt(d.mtd),isV?fv(d.ytd):fmt(d.ytd),pct+'%'].forEach((v,i)=>{const td=document.createElement('td');td.textContent=v;if(i===0)td.style.color=DIM();else if(i<4)td.style.color=isV?TXT():gc(d.ytd);else{td.style.color=c;td.style.fontWeight='700';}tr.appendChild(td);});bpTbl.appendChild(tr);
  });
  bp.appendChild(bpTbl);g2.appendChild(bp);

  // Risk Snapshot
  const rs=div({background:CARD(),border:`1px solid ${R()}40`,borderRadius:'10px',padding:'12px 14px'});
  rs.appendChild(secHdr('RISK SNAPSHOT',R()));
  const varPct=pctOf(RISK_SNAP.var,RISK_SNAP.varLimit);
  [[`Office VaR`,fmt(RISK_SNAP.var),B()],[`VaR Utilisation`,varPct+'%',varPct>=80?R():varPct>=60?A():G()],[`Largest Position`,RISK_SNAP.largestPos.n+' '+fmt(RISK_SNAP.largestPos.v),A()],[`MAs in Drawdown`,String(RISK_SNAP.maDD),RISK_SNAP.maDD>=5?R():A()],[`Max Intraday DD`,fmt(RISK_SNAP.maxDD),R()],[`Risk Limit Breaches`,String(RISK_SNAP.breaches),RISK_SNAP.breaches===0?G():R()]].forEach(([k,v,c])=>{
    const r=div({display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${BRD()}`});r.appendChild(span({fontSize:'10px',color:DIM()},k));r.appendChild(span({fontSize:'11px',fontWeight:'700',color:c},v));rs.appendChild(r);
  });
  g2.appendChild(rs);wrap.appendChild(g2);

  // Management Attention List
  const mal=div({background:CARD(),border:`1px solid ${R()}40`,borderRadius:'10px',padding:'12px 14px'});
  mal.appendChild(secHdr('MANAGEMENT ATTENTION LIST',R()));
  mal.appendChild(span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'8px'},'↗ Click row to open full MA dashboard'));
  const mTbl=document.createElement('table');
  const mTh=document.createElement('tr');
  ['MA','Batch','Flag','Today P&L','YTD P&L'].forEach(h=>{const th=document.createElement('th');th.textContent=h;mTh.appendChild(th);});mTbl.appendChild(mTh);
  FLAGGED.forEach(t=>{
    t.flags.forEach((flag,fi)=>{
      const tr=document.createElement('tr');tr.style.cursor='pointer';tr.addEventListener('click',()=>set('compModal',t));
      const fc=flag.includes('hard stop')||flag.includes('Negative')||flag.includes('critical')||flag.includes('Critical')||flag.includes('Risk override')?R():A();
      tr.style.borderLeft=`3px solid ${fc}`;
      [fi===0?t.n:'',fi===0?t.b:'',flag,fi===0?fmt(t.today):'',fi===0?fmt(t.ytd):''].forEach((v,i)=>{
        const td=document.createElement('td');td.textContent=v;
        if(i===0)td.style.fontWeight='700';if(i===2)td.style.color=fc;
        if(i===3)td.style.color=gc(t.today);if(i===4)td.style.color=gc(t.ytd);tr.appendChild(td);
      });mTbl.appendChild(tr);
    });
  });
  mal.appendChild(mTbl);wrap.appendChild(mal);
  return wrap;
}

// TRADERS tab
function buildTraders(){
  const wrap=div({overflowY:'auto',flex:'1',padding:'10px 12px'});
  const c=div({background:CARD(),border:`1px solid ${BRD()}`,borderRadius:'10px',padding:'12px 14px'});
  c.appendChild(secHdr('ALL TRADERS — YTD RANKING',B()));
  c.appendChild(span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'8px'},'↗ Click any row to open full MA dashboard · TOP 5 / BTM 5 = YTD ranking'));
  const sorted=[...ALL_T].sort((a,b)=>b.ytd-a.ytd);
  const tbl=document.createElement('table');
  const th=document.createElement('tr');
  ['#','MA','Batch','Today','MTD','YTD','vs Tgt','Win%','Sharpe','Beh.','Health','Flags'].forEach(h=>{const t=document.createElement('th');t.textContent=h;th.appendChild(t);});tbl.appendChild(th);
  sorted.forEach((t,idx)=>{
    const tr=document.createElement('tr');tr.style.cursor='pointer';tr.addEventListener('click',()=>set('compModal',t));
    const ht=t.health.perf+t.health.risk+t.health.beh+t.health.proc+t.health.scl;
    [String(idx+1),t.n,t.b,fmt(t.today),fmt(t.mtd),fmt(t.ytd),pctOf(t.ytd,t.ytdT)+'%',t.wr+'%',t.sharpe.toFixed(1),t.bScore+'/100',ht+'/100',t.flags.length?t.flags.length+'⚠':'—'].forEach((v,i)=>{
      const td=document.createElement('td');td.textContent=v;
      if(i===1){td.style.fontWeight='700';td.style.color=TOP5_YTD.has(t.n)?G():BOT5_YTD.has(t.n)?R():TXT();}
      if(i===3)td.style.color=gc(t.today);if(i===4)td.style.color=gc(t.mtd);if(i===5)td.style.color=gc(t.ytd);
      if(i===6)td.style.color=pctOf(t.ytd,t.ytdT)>=80?G():pctOf(t.ytd,t.ytdT)>=60?A():R();
      if(i===7)td.style.color=t.wr>=55?G():t.wr>=45?A():R();
      if(i===8)td.style.color=t.sharpe>=2?G():t.sharpe>=1?A():R();
      if(i===9)td.style.color=hc(t.bScore);if(i===10)td.style.color=hc(ht);
      if(i===11&&t.flags.length)td.style.color=R();

}

// SCALABILITY tab
function buildScalability(){
  const wrap=div({overflowY:'auto',flex:'1',padding:'10px 12px'});

  c.appendChild(secHdr('SCALABILITY DASHBOARD','#B47FFF'));
  c.appendChild(span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'8px'},'↗ Click any row for full capital allocation and MA dashboard'));
  const tbl=document.createElement('table');
  const th=document.createElement('tr');
  ['MA','YTD P&L','Sharpe','Beh. Score','Process Score','Market Capacity','Rating','Curr Alloc','Rec Alloc'].forEach(h=>{const t=document.createElement('th');t.textContent=h;th.appendChild(t);});tbl.appendChild(th);
  [...ALL_T].sort((a,b)=>b.scale-a.scale||b.ytd-a.ytd).forEach(t=>{
    const tr=document.createElement('tr');tr.style.cursor='pointer';tr.addEventListener('click',()=>set('compModal',t));
    [t.n,fmt(t.ytd),t.sharpe.toFixed(2),t.bScore+'/100',t.pScore+'/100',t.cap,stars(t.scale),'$'+t.alloc.curr/1000+'K',t.alloc.rec>0?'$'+t.alloc.rec/1000+'K':'—'].forEach((v,i)=>{
      const td=document.createElement('td');td.textContent=v;

      if(i===2)td.style.color=t.sharpe>=2?G():t.sharpe>=1?A():R();
      if(i===3)td.style.color=hc(t.bScore);if(i===4)td.style.color=hc(t.pScore);

      tr.appendChild(td);
    });tbl.appendChild(tr);
  });
  c.appendChild(tbl);wrap.appendChild(c);return wrap;

// INCENTIVES tab
function buildIncentives(){
  const wrap=div({overflowY:'auto',flex:'1',padding:'10px 12px',display:'flex',flexDirection:'column',gap:'8px'});
  const targets={ACE:180000,BRX:160000,CYN:140000,RSH:120000,DKL:120000,EFT:100000,QBF:90000,MZC:90000,OWV:80000,PYK:80000,LXD:70000,NRP:60000,KTB:60000,JVN:60000,HWP:50000,GQM:50000,FZR:50000};
  const mtdTarget=2100000,mtdActual=DESK_BUSI.vol.mtd;
  const oc=div({background:CARD(),border:`1px solid ${A()}40`,borderRadius:'10px',padding:'12px 14px'});
  oc.appendChild(secHdr('OFFICE INCENTIVE SUMMARY',A()));
  [[`Monthly RTs — Actual`,fv(mtdActual),'/ '+fv(mtdTarget)+' target'],[`Progress`,pctOf(mtdActual,mtdTarget)+'%','of monthly RT target']].forEach(([k,v,note])=>{const r=div({display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${BRD()}`});r.appendChild(span({fontSize:'10px',color:DIM()},k));r.appendChild(div({display:'flex',gap:'8px'},[span({fontSize:'11px',fontWeight:'700',color:pctOf(mtdActual,mtdTarget)>=80?G():pctOf(mtdActual,mtdTarget)>=60?A():R()},v),span({fontSize:'9px',color:MUT()},note)]));oc.appendChild(r);});
  oc.appendChild(hbar(pctOf(mtdActual,mtdTarget),A()));
  wrap.appendChild(oc);

  const tc2=div({background:CARD(),border:`1px solid ${BRD()}`,borderRadius:'10px',padding:'12px 14px'});
  tc2.appendChild(secHdr('MONTHLY RT PROGRESS — PER TRADER',A()));
  tc2.appendChild(span({fontSize:'8px',color:MUT(),display:'block',marginBottom:'8px'},'↗ Click any row to open full MA dashboard'));
  const tbl=document.createElement('table');
  const th=document.createElement('tr');
  ['MA','Batch','MTD RTs','Monthly Target','Progress','Status'].forEach(h=>{const t=document.createElement('th');t.textContent=h;th.appendChild(t);});tbl.appendChild(th);
  [...ALL_T].sort((a,b)=>{const pa=pctOf(Math.max(a.mtd,0),targets[a.n]||50000),pb=pctOf(Math.max(b.mtd,0),targets[b.n]||50000);return pb-pa;}).forEach(t=>{
    const tgt=targets[t.n]||50000,mtdRTs=Math.round(mtdActual/ALL_T.length*(t.ytd>500000?1.4:t.ytd>0?1.0:0.5));
    const pct=pctOf(mtdRTs,tgt),sc=pct>=100?G():pct>=70?A():R(),st=pct>=100?'✓ On Track':pct>=70?'Near Target':'Behind';
    const tr=document.createElement('tr');tr.style.cursor='pointer';tr.addEventListener('click',()=>set('compModal',t));
    [t.n,t.b,fv(mtdRTs),fv(tgt),pct+'%',st].forEach((v,i)=>{const td=document.createElement('td');td.textContent=v;if(i===0)td.style.fontWeight='700';if(i===4||i===5)td.style.color=sc;tr.appendChild(td);});tbl.appendChild(tr);
  });
  tc2.appendChild(tbl);wrap.appendChild(tc2);return wrap;
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
const TABS=['FLOOR','OVERVIEW','TRADERS','SCALABILITY','INCENTIVES'];
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const today=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  // Header
  const hdr=div({background:T.bg,borderBottom:`1px solid ${BRD()}`,padding:'7px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:'0'});
  hdr.appendChild(div({display:'flex',alignItems:'center',gap:'8px'},[div({width:'7px',height:'7px',borderRadius:'50%',background:T.dot,boxShadow:`0 0 8px ${T.dot}`,flexShrink:'0'}),span({fontSize:'10px',color:MUT(),letterSpacing:'0.12em'},'TRADING FLOOR · WARSAW')]));
  const rightBar=div({display:'flex',alignItems:'center',gap:'10px'});
  rightBar.appendChild(span({fontSize:'10px',color:MUT()},`${today} · ${now} CET`));
  const themBtn=btn(T.btnTheme,{background:SUB(),color:MUT(),border:`1px solid ${BRD()}`,borderRadius:'6px',padding:'3px 10px',fontSize:'9px',fontWeight:'700'},()=>set('theme',S.theme==='dark'?'light':'dark'));
  rightBar.appendChild(themBtn);hdr.appendChild(rightBar);app.appendChild(hdr);

  // Tab bar
  const tabBar=div({background:SUR(),borderBottom:`1px solid ${BRD()}`,padding:'4px 12px',display:'flex',gap:'2px',flexShrink:'0'});
  TABS.forEach(t=>{const b=document.createElement('button');b.className='tab tb'+(t===S.tab?' on':'');b.textContent=t;b.addEventListener('click',()=>set('tab',t));tabBar.appendChild(b);});
  app.appendChild(tabBar);

  // Content
  const content=div({display:'flex',flexDirection:'column',flex:'1',minHeight:'0',overflow:'hidden'});
  if(S.tab==='FLOOR') content.appendChild(buildFloor());
  else if(S.tab==='OVERVIEW') content.appendChild(buildOverview());
  else if(S.tab==='TRADERS') content.appendChild(buildTraders());
  else if(S.tab==='SCALABILITY') content.appendChild(buildScalability());
  else if(S.tab==='INCENTIVES') content.appendChild(buildIncentives());
  app.appendChild(content);

  // Modals
  if(S.modal)app.appendChild(buildPnLModal());
  if(S.tModal)app.appendChild(buildYTDModal(S.tModal));
  if(S.compModal)app.appendChild(buildMAModal(S.compModal));
}

render();
